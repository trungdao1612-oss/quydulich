<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sổ Tay Chi Tiêu Du Lịch Nhóm</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
</head>
<body class="bg-slate-50 font-sans min-h-screen">

    <header class="bg-gradient-to-r from-indigo-600 to-blue-500 text-white py-6 shadow-lg text-center">
        <h1 class="text-3xl font-bold tracking-wide"><i class="fa-solid fa-plane-departure mr-2"></i>Sổ Tay Chi Tiêu Du Lịch Nhóm</h1>
        <p class="text-indigo-100 mt-1 text-sm">Dữ liệu tự động đồng bộ thời gian thực cho cả nhóm</p>
    </header>

    <main class="max-w-5xl mx-auto px-4 py-8 grid grid-cols-1 md:grid-cols-3 gap-6">
        
        <div class="md:col-span-1 space-y-6">
            <div class="bg-white p-5 rounded-2xl shadow-sm border border-slate-100">
                <h2 class="text-lg font-semibold text-slate-800 mb-4"><i class="fa-solid fa-gear mr-2 text-indigo-500"></i>Cài đặt chuyến đi</h2>
                <div class="space-y-3">
                    <div>
                        <label class="block text-xs font-medium text-slate-500 mb-1">Tổng ngân sách (VND)</label>
                        <input type="number" id="totalBudget" class="w-full px-3 py-2 border border-slate-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-400">
                    </div>
                    <div>
                        <label class="block text-xs font-medium text-slate-500 mb-1">Số người tham gia</label>
                        <input type="number" id="totalPeople" min="1" class="w-full px-3 py-2 border border-slate-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-400">
                    </div>
                </div>
            </div>

            <div class="bg-white p-5 rounded-2xl shadow-sm border border-slate-100">
                <h2 class="text-lg font-semibold text-slate-800 mb-4"><i class="fa-solid fa-cart-plus mr-2 text-emerald-500"></i>Thêm chi tiêu mới</h2>
                <form id="expenseForm" class="space-y-3">
                    <div>
                        <label class="block text-xs font-medium text-slate-500 mb-1">Tên khoản chi</label>
                        <input type="text" id="expName" placeholder="Ví dụ: Tiền phòng, ăn uống..." required class="w-full px-3 py-2 border border-slate-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-400">
                    </div>
                    <div>
                        <label class="block text-xs font-medium text-slate-500 mb-1">Số tiền (VND)</label>
                        <input type="number" id="expAmount" placeholder="0" required class="w-full px-3 py-2 border border-slate-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-400">
                    </div>
                    <div>
                        <label class="block text-xs font-medium text-slate-500 mb-1">Người trả trước</label>
                        <input type="text" id="expPayer" placeholder="Ví dụ: Tuấn, Hoa..." class="w-full px-3 py-2 border border-slate-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-400">
                    </div>
                    <button type="submit" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-medium py-2 rounded-lg transition shadow-sm mt-2">
                        Thêm vào danh sách
                    </button>
                </form>
            </div>
        </div>

        <div class="md:col-span-2 space-y-6">
            <div class="grid grid-cols-1 sm:grid-cols-3 gap-4">
                <div class="bg-white p-4 rounded-xl border border-slate-100 shadow-sm text-center">
                    <p class="text-xs font-medium text-slate-400 uppercase tracking-wider">Tổng đã chi</p>
                    <p id="statSpent" class="text-xl font-bold text-slate-800 mt-1">0 đ</p>
                </div>
                <div class="bg-white p-4 rounded-xl border border-slate-100 shadow-sm text-center">
                    <p class="text-xs font-medium text-slate-400 uppercase tracking-wider">Còn lại</p>
                    <p id="statRemaining" class="text-xl font-bold text-emerald-600 mt-1">0 đ</p>
                </div>
                <div class="bg-white p-4 rounded-xl border border-slate-100 shadow-sm text-center">
                    <p class="text-xs font-medium text-slate-400 uppercase tracking-wider">Bình quân / Người</p>
                    <p id="statPerPerson" class="text-xl font-bold text-indigo-600 mt-1">0 đ</p>
                </div>
            </div>

            <div class="bg-white p-5 rounded-2xl shadow-sm border border-slate-100">
                <h2 class="text-lg font-semibold text-slate-800 mb-4"><i class="fa-solid fa-list-check mr-2 text-indigo-500"></i>Lịch sử chi tiêu cả nhóm</h2>
                <div class="overflow-x-auto">
                    <table class="w-full text-left border-collapse">
                        <thead>
                            <tr class="border-b border-slate-100 text-slate-400 text-sm font-medium">
                                <th class="pb-3 w-1/2">Khoản chi</th>
                                <th class="pb-3">Người chi</th>
                                <th class="pb-3 text-right">Số tiền</th>
                                <th class="pb-3 text-center">Xóa</th>
                            </tr>
                        </thead>
                        <tbody id="expenseList" class="divide-y divide-slate-50 text-slate-700"></tbody>
                    </table>
                </div>
                <div id="emptyState" class="text-center py-12 text-slate-400">
                    <i class="fa-solid fa-wallet text-4xl mb-2 text-slate-300"></i>
                    <p>Mọi người chưa nhập khoản chi nào.</p>
                </div>
            </div>
        </div>
    </main>

    <script>
        // CẤU HÌNH KẾT NỐI GOOGLE FIREBASE
        // Hãy thay thế bằng đoạn cấu hình của riêng bạn lấy từ Firebase Console để lưu trữ riêng biệt
        const firebaseConfig = {
  apiKey: "AIzaSyCCRh3UZcbXEtjIlz5-YHprS7w3Ol50QPs",
  authDomain: "quydulich.firebaseapp.com",
  databaseURL: "https://quydulich-default-rtdb.firebaseio.com", // <-- Kiểm tra xem đã có dòng này chưa
  projectId: "quydulich",
  storageBucket: "quydulich.firebasestorage.app",
  messagingSenderId: "74541974693",
  appId: "1:74541974693:web:0c1847f224c43ef002394c",
  measurementId: "G-EM0JVCFDKC"
};
        
        // Khởi tạo Firebase
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        // Tự động gom nhóm dữ liệu theo từng đường link riêng biệt bằng ID chuyến đi trên URL
        let urlParams = new URLSearchParams(window.location.search);
        let tripId = urlParams.get('trip');
        if (!tripId) {
            tripId = 'chuyen_di_' + Math.random().toString(36).substr(2, 9);
            window.history.replaceState({}, document.title, window.location.pathname + '?trip=' + tripId);
        }

        const tripRef = database.ref('trips/' + tripId);

        // Các thành phần DOM
        const totalBudgetInput = document.getElementById('totalBudget');
        const totalPeopleInput = document.getElementById('totalPeople');
        const expenseForm = document.getElementById('expenseForm');
        const expNameInput = document.getElementById('expName');
        const expAmountInput = document.getElementById('expAmount');
        const expPayerInput = document.getElementById('expPayer');
        const expenseList = document.getElementById('expenseList');
        const emptyState = document.getElementById('emptyState');
        const statSpent = document.getElementById('statSpent');
        const statRemaining = document.getElementById('statRemaining');
        const statPerPerson = document.getElementById('statPerPerson');

        function formatMoney(amount) {
            return new Intl.NumberFormat('vi-VN', { style: 'currency', currency: 'VND' }).format(amount);
        }

        // TỰ ĐỘNG ĐỒNG BỘ DỮ LIỆU TỪ MẠNG VỀ (BẤT CỨ AI SỬA, MÁY KHÁC TỰ THAY ĐỔI THEO)
        tripRef.on('value', (snapshot) => {
            const data = snapshot.val() || {};
            
            totalBudgetInput.value = data.budget || 10000000;
            totalPeopleInput.value = data.people || 4;
            
            const expenses = data.expenses ? Object.values(data.expenses) : [];
            const expenseIds = data.expenses ? Object.keys(data.expenses) : [];

            const budget = parseFloat(totalBudgetInput.value) || 0;
            const people = parseInt(totalPeopleInput.value) || 1;
            const totalSpent = expenses.reduce((sum, item) => sum + item.amount, 0);
            const remaining = budget - totalSpent;
            const perPerson = totalSpent / people;

            statSpent.innerText = formatMoney(totalSpent);
            statRemaining.innerText = formatMoney(remaining);
            statPerPerson.innerText = formatMoney(perPerson);

            statRemaining.className = remaining < 0 ? "text-xl font-bold text-red-600 mt-1" : "text-xl font-bold text-emerald-600 mt-1";

            expenseList.innerHTML = '';
            if (expenses.length === 0) {
                emptyState.classList.remove('hidden');
            } else {
                emptyState.classList.add('hidden');
                expenses.forEach((item, index) => {
                    const row = document.createElement('tr');
                    row.className = "hover:bg-slate-50 transition";
                    row.innerHTML = `
                        <td class="py-3 font-medium">${item.name}</td>
                        <td class="py-3 text-slate-500 text-sm">${item.payer || 'Không rõ'}</td>
                        <td class="py-3 text-right font-semibold text-slate-800">${formatMoney(item.amount)}</td>
                        <td class="py-3 text-center">
                            <button onclick="deleteExpense('${expenseIds[index]}')" class="text-red-400 hover:text-red-600 transition">
                                <i class="fa-solid fa-trash-can"></i>
                            </button>
                        </td>
                    `;
                    expenseList.appendChild(row);
                });
            }
        });

        // TỰ ĐỘNG LƯU KHI ĐỔI CẤU HÌNH NGÂN SÁCH/SỐ NGƯỜI
        totalBudgetInput.addEventListener('input', () => {
            tripRef.child('budget').set(totalBudgetInput.value);
        });
        totalPeopleInput.addEventListener('input', () => {
            tripRef.child('people').set(totalPeopleInput.value);
        });

        // TỰ ĐỘNG ĐẨY KHOẢN CHI MỚI LÊN MẠNG KHI BẤM ADD
        expenseForm.addEventListener('submit', function(e) {
            e.preventDefault();
            const newExpenseRef = tripRef.child('expenses').push();
            newExpenseRef.set({
                name: expNameInput.value,
                amount: parseFloat(expAmountInput.value) || 0,
                payer: expPayerInput.value
            });

            expNameInput.value = '';
            expAmountInput.value = '';
            expPayerInput.value = '';
            expNameInput.focus();
        });

        // HÀM XÓA KHOẢN CHI TRÊN DATABASE TỪ XA
        function deleteExpense(key) {
            if(confirm("Xóa khoản chi này?")) {
                tripRef.child('expenses').child(key).remove();
            }
        }
    </script>
</body>
</html>
